<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Analytics</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar" id="mainNav">

    <img src="assets/logo.svg" alt="Trivio" class="navbar-logo">

    <button class="menu-toggle" onclick="document.getElementById('mainNav').classList.toggle('menu-open')" aria-label="Toggle menu">☰</button>

    <div>
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="manage-exams.html">Manage Exams</a>
    </div>

</nav>

<div class="dashboard">

    <h1>📊 Admin Analytics</h1>

    <div class="stats">

        <div class="stat-card">
            <h2 id="totalUsers">0</h2>
            <p>Total Users</p>
        </div>

        <div class="stat-card">
            <h2 id="totalExams">0</h2>
            <p>Total Exams</p>
        </div>

        <div class="stat-card">
            <h2 id="totalAttempts">0</h2>
            <p>Total Attempts</p>
        </div>

        <div class="stat-card">
            <h2 id="avgScore">0%</h2>
            <p>Average Score</p>
        </div>

    </div>

    <div class="recent-section">

        <h2>Recent Results</h2>

        <div class="table-container">

            <table>

                <thead>
                    <tr>
                        <th>User Email</th>
                        <th>Exam Name</th>
                        <th>Score</th>
                        <th>Percentage</th>
                    </tr>
                </thead>

                <tbody id="resultTable">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="js/adminAnalytics.js"></script>

</body>
</html>
