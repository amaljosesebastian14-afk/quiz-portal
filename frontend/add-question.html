<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar" id="mainNav">

    <img src="assets/logo.svg" alt="Trivio" class="navbar-logo">

    <button class="menu-toggle" onclick="document.getElementById('mainNav').classList.toggle('menu-open')" aria-label="Toggle menu">☰</button>

    <div>
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="manage-exams.html">Manage Exams</a>
        <a href="add-question.html">Add Question</a>
    </div>

</nav>

<div class="container">

    <div class="card form-card">

        <h2>Add Question</h2>

        <label>Exam</label>

        <select id="examSelect"></select>

        <label>Question</label>

        <textarea
            id="question"
            rows="3"
            placeholder="Enter Question">
        </textarea>

        <div class="field-row">

            <div>
                <label>Option A</label>
                <input
                    type="text"
                    id="option1"
                    placeholder="Enter Option A">
            </div>

            <div>
                <label>Option B</label>
                <input
                    type="text"
                    id="option2"
                    placeholder="Enter Option B">
            </div>

            <div>
                <label>Option C</label>
                <input
                    type="text"
                    id="option3"
                    placeholder="Enter Option C">
            </div>

            <div>
                <label>Option D</label>
                <input
                    type="text"
                    id="option4"
                    placeholder="Enter Option D">
            </div>

        </div>

        <label>Correct Answer</label>

        <select id="correctAnswer">

            <option value="0">Option A</option>
            <option value="1">Option B</option>
            <option value="2">Option C</option>
            <option value="3">Option D</option>

        </select>

        <button class="btn-full" onclick="addQuestion()">
            Add Question
        </button>

    </div>

</div>

<script src="js/addQuestion.js"></script>

</body>
</html>
