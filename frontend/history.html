<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Exam History</title>

    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

    <link
        rel="stylesheet"
        href="css/style.css"
    >

</head>

<body>

    <nav class="navbar" id="mainNav">

        <img src="assets/logo.svg" alt="Trivio" class="navbar-logo">

        <button class="menu-toggle" onclick="document.getElementById('mainNav').classList.toggle('menu-open')" aria-label="Toggle menu">☰</button>

        <div>

            <a href="dashboard.html">
                Dashboard
            </a>

            <a href="profile.html">
                Profile
            </a>

            <a href="#" onclick="logout()">
                Logout
            </a>

        </div>

    </nav>

    <div class="container">

        <h1>📊 My Exam History</h1>

        <p class="welcome">
            View all your exam attempts and scores.
        </p>

        <div class="card">

            <div class="table-container table-cards">

                <table class="history-table">

                    <thead>

                        <tr>

                            <th>
                                Exam Name
                            </th>

                            <th>
                                Score
                            </th>

                            <th>
                                Percentage
                            </th>

                            <th>
                                Date
                            </th>

                        </tr>

                    </thead>

                    <tbody id="historyTable">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script src="js/history.js"></script>

    <script>

        function logout(){

            localStorage.clear();

            window.location =
            "login.html";
        }

    </script>

</body>
</html>
