<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Exam</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar" id="mainNav">
    <h2>Quiz Admin</h2>

    <button class="menu-toggle" onclick="document.getElementById('mainNav').classList.toggle('menu-open')" aria-label="Toggle menu">☰</button>

    <div>
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="manage-exams.html">Manage Exams</a>
    </div>
</nav>

<div class="container">

    <div class="dashboard-grid">

        <div class="card">

            <h2>📝 Create New Exam</h2>

            <label>Exam Title</label>
            <input
                type="text"
                id="title"
                placeholder="Node.js Quiz">

            <label>Description</label>
            <textarea
                id="description"
                rows="4"
                placeholder="Enter exam description">
            </textarea>

            <label>Duration (Minutes)</label>
            <input
                type="number"
                id="duration"
                placeholder="60">

            <label>Total Questions</label>
            <input
                type="number"
                id="totalQuestions"
                placeholder="20">

            <button class="btn-full" onclick="createExam()">
                Create Exam
            </button>

        </div>

        <div class="card">

            <h2>📋 Preview</h2>

            <p>
                <strong>Title:</strong>
                <span id="previewTitle">-</span>
            </p>

            <p>
                <strong>Description:</strong>
                <span id="previewDescription">-</span>
            </p>

            <p>
                <strong>Duration:</strong>
                <span id="previewDuration">0</span>
                Minutes
            </p>

            <p>
                <strong>Total Questions:</strong>
                <span id="previewQuestions">0</span>
            </p>

        </div>

    </div>

</div>

<script src="js/createExam.js"></script>

</body>
</html>
