<svg viewBox="0 0 300 210" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes pulseGlow{
  0%,100%{ filter:drop-shadow(0 0 0px rgba(212,255,63,0)); }
  50%{ filter:drop-shadow(0 0 8px rgba(212,255,63,.7)); }
}
.correct-answer{
  animation:pulseGlow 2.6s ease-in-out infinite;
}
</style>
<!-- laptop base -->
<path d="M14 172 L286 172 L262 190 L38 190 Z" fill="#4B52A0"/>
<rect x="128" y="191" width="44" height="5" rx="2.5" fill="#5A61B8"/>

<!-- laptop screen -->
<rect x="34" y="14" width="232" height="158" rx="16" fill="#232964" stroke="#4B52A0" stroke-width="3"/>
<rect x="50" y="30" width="200" height="126" rx="10" fill="#12153D"/>

<!-- quiz question line -->
<rect x="66" y="48" width="140" height="10" rx="5" fill="#A8ABE0"/>
<rect x="66" y="64" width="90" height="10" rx="5" fill="#A8ABE0" opacity="0.6"/>

<!-- answer options -->
<rect x="66" y="88" width="168" height="20" rx="10" fill="#2A3170" stroke="#4B52A0" stroke-width="2"/>

<g class="correct-answer">
<rect x="66" y="114" width="168" height="20" rx="10" fill="#D4FF3F"/>
<path d="M206 124 L212 130 L222 116" stroke="#12153D" stroke-width="3.5" fill="none"
      stroke-linecap="round" stroke-linejoin="round"/>
</g>

<rect x="66" y="140" width="168" height="20" rx="10" fill="#2A3170" stroke="#4B52A0" stroke-width="2"/>

</svg>
