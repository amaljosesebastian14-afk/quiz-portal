<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Question</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar" id="mainNav">

    <img src="assets/logo.svg" alt="Trivio" class="navbar-logo">

    <button class="menu-toggle" onclick="document.getElementById('mainNav').classList.toggle('menu-open')" aria-label="Toggle menu">☰</button>

    <div>
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="manage-exams.html">Manage Exams</a>
        <a href="view-questions.html">Manage Questions</a>
    </div>

</nav>

<div class="container">

    <div class="card form-card">

        <h2>Edit Question</h2>

        <label>Question</label>
        <input
        id="question"
        placeholder="Question">

        <div class="field-row">

            <div>
                <label>Option 1</label>
                <input
                id="option1"
                placeholder="Option 1">
            </div>

            <div>
                <label>Option 2</label>
                <input
                id="option2"
                placeholder="Option 2">
            </div>

            <div>
                <label>Option 3</label>
                <input
                id="option3"
                placeholder="Option 3">
            </div>

            <div>
                <label>Option 4</label>
                <input
                id="option4"
                placeholder="Option 4">
            </div>

        </div>

        <label>Correct Answer</label>
        <select id="correctAnswer">

            <option value="0">
                Option 1
            </option>

            <option value="1">
                Option 2
            </option>

            <option value="2">
                Option 3
            </option>

            <option value="3">
                Option 4
            </option>

        </select>

        <button
        class="btn-full"
        onclick="updateQuestion()">
        Update Question
        </button>

    </div>

</div>

<script src="js/editQuestion.js"></script>

</body>
</html>
