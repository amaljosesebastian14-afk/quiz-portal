<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Leaderboard</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

</head>

<body>

    <nav class="navbar" id="mainNav">

        <h2>Quiz Portal</h2>

        <button class="menu-toggle" onclick="document.getElementById('mainNav').classList.toggle('menu-open')" aria-label="Toggle menu">☰</button>

        <div>

            <a href="dashboard.html">
                Dashboard
            </a>

            <a href="history.html">
                My Results
            </a>

            <a href="profile.html">
                Profile
            </a>

        </div>

    </nav>

    <div class="container">

        <h1>
            🏆 Leaderboard
        </h1>

        <p class="welcome">
            Top performers for this exam.......
        </p>

        <div class="card">

            <div class="table-container">

                <table class="leaderboard-table">

                    <thead>

                        <tr>

                            <th>
                                Rank
                            </th>

                            <th>
                                Name
                            </th>

                            <th>
                                Email
                            </th>

                            <th>
                                Score
                            </th>

                            <th>
                                Percentage
                            </th>

                        </tr>

                    </thead>

                    <tbody id="leaderboard">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script src="js/leaderboard.js"></script>

</body>

</html>
