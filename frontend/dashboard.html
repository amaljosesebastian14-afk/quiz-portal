<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar" id="mainNav">
    <img src="assets/logo.svg" alt="Trivio" class="navbar-logo">

    <button class="menu-toggle" onclick="document.getElementById('mainNav').classList.toggle('menu-open')" aria-label="Toggle menu">☰</button>

    <div>
        <a href="dashboard.html" data-i18n="nav.dashboard">Home</a>
        <a href="history.html" data-i18n="nav.myResults">My Results</a>
        <a href="leaderboard.html" data-i18n="nav.leaderboard">
            Leaderboard
        </a>
        <a href="profile.html" data-i18n="nav.profile">Profile</a>
        <select id="langSwitcher" class="lang-switcher" style="margin-left:8px;">
            <option value="en">English</option>
            <option value="ml">മലയാളം</option>
        </select>
        <a href="#" onclick="logout()" data-i18n="nav.logout">Logout</a>
    </div>
</nav>

<div class="container">

    <h1 data-i18n="dashboard.heading">📚 Available Exams</h1>

    <p class="welcome" data-i18n="dashboard.welcome">
        Welcome back! Select an exam to begin.
    </p>

    <div id="examContainer" class="dashboard-grid">

    </div>

</div>

<script src="js/dashboard.js"></script>
<script src="assets/i18n.js"></script>

<script>
function logout(){

    localStorage.clear();

    window.location =
    "login.html";
}
</script>

</body>
</html>
